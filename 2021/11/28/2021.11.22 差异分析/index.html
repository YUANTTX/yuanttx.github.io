    <div class="post-body" itemprop="articleBody">
        <p>在R中使用三个常见的R包进行差异分析</p>
<span id="more"></span>

<h1 id="差异分析"><a href="#差异分析" class="headerlink" title="差异分析"></a>差异分析</h1><h4 id="1、limma差异分析"><a href="#1、limma差异分析" class="headerlink" title="1、limma差异分析"></a>1、limma差异分析</h4><figure class="highlight r"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">limmaf &lt;- <span class="keyword">function</span>(indat,ingroup,inp,inlogfc,batoh)&#123;</span><br><span class="line">  </span><br><span class="line">  suppressMessages(library(limma))</span><br><span class="line">  suppressMessages(library(dplyr))</span><br><span class="line">  </span><br><span class="line">  print(<span class="string">&#x27;limma is being used for differential analysis&#x27;</span>)</span><br><span class="line">  design &lt;- model.matrix(~<span class="number">0</span>+factor(ingroup))</span><br><span class="line">  colnames(design) = levels(factor(ingroup))</span><br><span class="line">  rownames(design) = colnames(indat)</span><br><span class="line">  con.matrix &lt;- makeContrasts(batoh,levels = design)</span><br><span class="line">  fit &lt;- lmFit(indat,design)</span><br><span class="line">  fit2 &lt;- contrasts.fit(fit,con.matrix)</span><br><span class="line">  fit2 &lt;- eBayes(fit2)</span><br><span class="line">  temput &lt;- topTable(fit2,coef = <span class="number">1</span>,n = <span class="literal">Inf</span>)</span><br><span class="line">  temput[sapply(temput,<span class="built_in">is.infinite</span>)] &lt;- <span class="literal">NA</span></span><br><span class="line">  temput &lt;- na.omit(temput)</span><br><span class="line">  temput$State &lt;- ifelse(temput$P.Value &gt; inp,<span class="string">&#x27;not&#x27;</span>,</span><br><span class="line">                         ifelse(temput$logFC &gt; inlogfc,<span class="string">&#x27;up&#x27;</span>,</span><br><span class="line">                                ifelse(temput$logFC &lt; -inlogfc,<span class="string">&#x27;down&#x27;</span>,<span class="string">&#x27;not&#x27;</span>)))</span><br><span class="line">  temput$SYMBOL &lt;- rownames(temput)</span><br><span class="line">  print(<span class="string">&#x27;successful&#x27;</span>)</span><br><span class="line">  <span class="built_in">return</span>(temput)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>



<h4 id="2、DEseq2差异分析"><a href="#2、DEseq2差异分析" class="headerlink" title="2、DEseq2差异分析"></a>2、DEseq2差异分析</h4><figure class="highlight r"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br></pre></td><td class="code"><pre><span class="line">DEseq2f &lt;- <span class="keyword">function</span>(indat,ingroup,inp,inlgfc)&#123;</span><br><span class="line">  </span><br><span class="line">  suppressMessages(library(dplyr))</span><br><span class="line">  suppressMessages(library(DESeq2))</span><br><span class="line">  </span><br><span class="line">  countData &lt;- indat</span><br><span class="line">  condition &lt;- factor(ingroup)</span><br><span class="line">  ids &lt;- rownames(countData)</span><br><span class="line">  countData &lt;- apply(as.matrix(countData),<span class="number">2</span>,<span class="keyword">function</span>(x) <span class="built_in">as.integer</span>(x))</span><br><span class="line">  rownames(countData) &lt;- ids</span><br><span class="line">  countData &lt;- as.data.frame(countData)</span><br><span class="line">  </span><br><span class="line">  print(<span class="string">&#x27;DESeq2 is being used for differential analysis&#x27;</span>)</span><br><span class="line">  colData &lt;- data.frame(row.names=colnames(countData), condition)</span><br><span class="line">  dds &lt;- DESeqDataSetFromMatrix(countData, DataFrame(condition), design= ~ condition )</span><br><span class="line">  dds &lt;- DESeq(dds)</span><br><span class="line">  res &lt;- results(dds)</span><br><span class="line">  resinfo &lt;- as.data.frame(res)</span><br><span class="line">  resinfo$SYMBOL &lt;- rownames(resinfo)</span><br><span class="line">  resinfo$State &lt;- ifelse(resinfo$pvalue &gt; inp,<span class="string">&#x27;not&#x27;</span>,</span><br><span class="line">                          ifelse(resinfo$log2FoldChange &gt;= inlgfc,<span class="string">&#x27;up&#x27;</span>,</span><br><span class="line">                                 ifelse(resinfo$log2FoldChange &lt;= -inlgfc,<span class="string">&#x27;down&#x27;</span>,<span class="string">&#x27;not&#x27;</span>)))</span><br><span class="line">  <span class="built_in">names</span>(resinfo)[<span class="built_in">names</span>(resinfo) == <span class="string">&#x27;log2FoldChange&#x27;</span>] &lt;- <span class="string">&#x27;logFC&#x27;</span></span><br><span class="line">  <span class="built_in">names</span>(resinfo)[<span class="built_in">names</span>(resinfo) == <span class="string">&#x27;pvalue&#x27;</span>] &lt;- <span class="string">&#x27;P.Value&#x27;</span></span><br><span class="line">  print(<span class="string">&#x27;successful&#x27;</span>)</span><br><span class="line">  <span class="built_in">return</span>(resinfo)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>



<h4 id="3、EdgR差异分析"><a href="#3、EdgR差异分析" class="headerlink" title="3、EdgR差异分析"></a>3、EdgR差异分析</h4><figure class="highlight r"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">Edgrf &lt;- <span class="keyword">function</span>(indat,ingroup,inp,inlgfc)&#123;</span><br><span class="line">  </span><br><span class="line">  suppressMessages(library(dplyr))</span><br><span class="line">  suppressMessages(library(edgeR))</span><br><span class="line">  </span><br><span class="line">  DEG &lt;- DGEList(counts=indat,group=factor(ingroup))</span><br><span class="line">  keep &lt;- rowSums(cpm(DEG)&gt;<span class="number">1</span>) &gt;= <span class="number">2</span></span><br><span class="line">  DEG &lt;- DEG[keep, , keep.lib.sizes=<span class="literal">FALSE</span>]</span><br><span class="line">  DEG$samples$lib.size &lt;- colSums(DEG$counts)</span><br><span class="line">  DEG &lt;- calcNormFactors(DEG)</span><br><span class="line">  design &lt;- model.matrix(~<span class="number">0</span>+factor(ingroup))</span><br><span class="line">  rownames(design) &lt;- colnames(DEG)</span><br><span class="line">  colnames(design) &lt;- levels(factor(ingroup))</span><br><span class="line">  DEG &lt;- estimateGLMCommonDisp(DEG,design)</span><br><span class="line">  DEG &lt;- estimateGLMTrendedDisp(DEG, design)</span><br><span class="line">  DEG &lt;- estimateGLMTagwiseDisp(DEG, design)</span><br><span class="line">  fit &lt;- glmFit(DEG, design)</span><br><span class="line">  lrt &lt;- glmLRT(fit, contrast=<span class="built_in">c</span>(<span class="number">1</span>,-<span class="number">1</span>)) </span><br><span class="line">  EDGR_INFO &lt;- topTags(lrt, n=nrow(DEG))</span><br><span class="line">  EDGR_INFO &lt;- as.data.frame(EDGR_INFO)</span><br><span class="line">  EDGR_INFO$Gene &lt;- rownames(EDGR_INFO)</span><br><span class="line">  EDGR_INFO$State &lt;- ifelse(EDGR_INFO$PValue &gt; inp,<span class="string">&#x27;not&#x27;</span>,</span><br><span class="line">                            ifelse(EDGR_INFO$logFC &gt;= inlgfc,<span class="string">&#x27;up&#x27;</span>,</span><br><span class="line">                                   ifelse(EDGR_INFO$logFC &lt;= -inlgfc,<span class="string">&#x27;down&#x27;</span>,<span class="string">&#x27;not&#x27;</span>)))</span><br><span class="line">  <span class="built_in">return</span>(EDGR_INFO)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
