<h1 id="差异分析"><a href="#差异分析" class="headerlink" title="差异分析"></a>差异分析</h1><h4 id="1、limma差异分析"><a href="#1、limma差异分析" class="headerlink" title="1、limma差异分析"></a>1、limma差异分析</h4><figure class="highlight r"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">limmaf <span class="operator">&lt;-</span> <span class="keyword">function</span><span class="punctuation">(</span>indat<span class="punctuation">,</span>ingroup<span class="punctuation">,</span>inp<span class="punctuation">,</span>inlogfc<span class="punctuation">,</span>batoh<span class="punctuation">)</span><span class="punctuation">&#123;</span></span><br><span class="line">  </span><br><span class="line">  suppressMessages<span class="punctuation">(</span>library<span class="punctuation">(</span>limma<span class="punctuation">)</span><span class="punctuation">)</span></span><br><span class="line">  suppressMessages<span class="punctuation">(</span>library<span class="punctuation">(</span>dplyr<span class="punctuation">)</span><span class="punctuation">)</span></span><br><span class="line">  </span><br><span class="line">  print<span class="punctuation">(</span><span class="string">&#x27;limma is being used for differential analysis&#x27;</span><span class="punct
